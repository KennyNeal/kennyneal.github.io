description: |
  <p>Day of Data Winnipeg 2026 is a free, community-driven event for data professionals, technology enthusiasts, students, and lifelong learners. Hosted at the University of Manitoba, the event builds on the tradition of Winnipeg's successful SQL Saturday conferences while expanding to encompass the full spectrum of modern data technologies from SQL Server to PostgreSQL to Databricks and more.</p>
  
