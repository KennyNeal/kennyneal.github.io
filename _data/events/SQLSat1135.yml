description: | 
    <p>Update: We are expanding our SQL Saturday Richmond event to include all databases & data platforms. To reflect this change, our new event name will be: <b>Day of Data Richmond</b>.</p>
    <p>Day of Data Richmond is a free (Saturday) training event for Data professionals and students.</br>
    This year, we also have 2 all-day <a href="https://dayofdata.org/2026-04-11-dayofdata1135/#precon">pre-con workshops</a> happening on Friday, April 10th. 
    Presentation topics include:</br>
    <ul><li>Database design, management & internals</li>
    <ul><li>SQL Server</li>
    <li>Postgres</li>
    <li>Duckdb</li>
    <li>Mariadb</li>
    <li>Azure SQL & AWS RDS Managed Databases</li></ul>
    <li>Business Intelligence / Power BI</li>
    <li>Azure Data Factory</li>
    <li>Microsoft Fabric</li>
    <li>Data Warehouse / Snowflake</li>
    <li>A.I. & Database Integration</li>
    <li>and more!</li></ul></p>

