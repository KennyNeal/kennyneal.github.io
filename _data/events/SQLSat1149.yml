description: | 
    <p>The Pacific Northwest Day of Data (previously known as SQL Saturday Oregon/SW Washington) is a free one-day training event for data professionals using the Microsoft Data Platform. Session topics include SQL Server, Microsoft Fabric, Power BI, Azure Synapse, data analytics, visualization and more!</p>
    <p>The Saturday conference attendance is free, but registration is required due to the venue capacity. Coffee and Beverages will be provided, and lunch will be available for a small fee to cover costs.</p>
    <p>We are returning to the Washington State University Vancouver campus. WSUV is located in Vancouver, Washington USA, about 20 min. from PDX & downtown Portland, and is easily accessible via C-Tran (the local bus), ride-sharing services, or a friendly local! </p>
    <p>Optional Friday all-day pre-conference sessions will be announced soon. There will be a nominal fee to attend one of the Friday pre-con sessions to cover speaker travel and facility costs. Pre-con sessions will be free to a limited number of WSUV students.</p>
    <p>PNW Day of Data will be announcing additional details as we get close to the event.  In addition, we will have our wonderful vendors available with new products, new knowledge, and new opportunities!  We will end with a raffle of gifts provided by our many won derful Sponsors to be randomly selected by our "Wheel of Fortune".  Remember, you have to be present to win!  Come join the Data Community Family and meet fellow data professionals, employers, vendors, and experts on November 7th!</p>
    <p>Register for SQL Saturday Oregon/SW Washington using the button below:</p>
  
