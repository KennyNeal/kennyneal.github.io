description: |
  <p>Data Day Edinburgh 2026 is a free one-day event for professionals who predominantly work with the Microsoft data platform. This community-led event offers content across data management, cloud and hybrid architecture, analytics, business intelligence, AI, and much more. Anyone working with the Microsoft data platform (Azure, SQL Server, Power BI, Fabric, Databricks) and the wider data ecosystem (e.g. Postgres, open-source tooling, artificial intelligence), as well as interested in professional development should attend.</p>
  
