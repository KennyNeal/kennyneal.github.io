precondetail: |
    <p>Pre-Cons will be held on Friday October 2nd.</p>
    <p><a href="https://www.eventbrite.com/e/boston-data-and-ai-saturday-2026-tickets-1987157502583"><h1>Adding PostgreSQL To Your SQL Server Skill Set - Grant Fritchey - Boston Data and AI Saturday 2026</h1></a><br>
    <a href="https://www.eventbrite.com/e/boston-data-and-ai-saturday-2026-tickets-1987157502583"><h3>Click Here To Register - https://www.eventbrite.com/e/boston-data-and-ai-saturday-2026-tickets-1987157502583</h3></a>
    </p>
    <h3>Session Details:</h3>
    <p>Organizations are adopting PostgreSQL faster than they're retiring SQL Server. If you manage both now, or soon will, this all-day class cuts the learning curve by showing you exactly where the platforms align and where they diverge.</p>
    <p>You'll learn PostgreSQL fundamentals through a SQL Server lens: architecture, queries, administration, tooling, and cloud deployment. Apply your existing expertise immediately instead of starting over.</p>
    <p><b>Who should attend:</b> DBAs, architects, and developers managing SQL Server who are now responsible for PostgreSQL in hybrid environments, cloud adoption, or modernization projects.</p>
        
    <h3>Speaker:</h3>
    <p><b>Grant Fritchey</b> is a Data Platform MVP and AWS Community Builder with over 30 years’ experience in IT, including time spent in support and development. Grant works with multiple data platforms including SQL Server and PostgreSQL as well as multiple cloud platforms. He has also developed in VB, VB.NET, C#, and Java. Grant writes books for Apress and Simple-Talk. Grant presents at conferences and user groups, large and small, all over the world. He joined Redgate Software as a product advocate in January 2011.</p>
    
    <br>

